<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sain Trix | Software House Company </title>
     <link rel="icon" type="image/png" href="Sain.png">
    <meta name="description" content="Sain Trix is a premium IT agency specializing in elite UX/UI design and full-stack web development. Our official website is launching soon.">
</head>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 440px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
        }

        .profile-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2.5rem;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .profile-image:hover {
            filter: grayscale(0%);
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 500;
            letter-spacing: -0.05em;
            margin-bottom: 0.75rem;
            line-height: 1.2;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            letter-spacing: -0.01em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<body>

    <div class="container">
        <div class="profile-wrapper">
            <!-- Replace 'avatar.jpg' with your actual image file name -->
            <img src="With suit.jpeg" alt="Founder" class="profile-image">
        </div>
        <h1>Saintrix Private Limited Tech Company website will be launch Soon</h1>
        <p>Something refined is in the works. Stay tuned for the official unveiling.</p>
    </div>

</body>
</html>
